name: HNG14-STAGE2-DEVOPS

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: localhost:5000
  IMAGE_PREFIX: job-tracker

jobs:
  PYTHON-LINT:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install Python lint deps
        run: pip install flake8
      - name: Run flake8
        run: flake8 .

  ESLINT:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4 
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install eslint
        run: npm install -g eslint
      - name: Run eslint
        working-directory: frontend
        run: npx eslint .

  hadolint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Lint Dockerfiles
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: "**/Dockerfile" 
          recursive: true

  test:
    runs-on: ubuntu-latest
    needs: [PYTHON-LINT, ESLINT, hadolint]
    services:
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install deps
        working-directory: api
        run: |
          pip install -r requirements.txt pytest pytest-cov fakeredis httpx
      - name: Set PYTHONPATH
        working-directory: api
        run: echo "PYTHONPATH=$PWD" >> $GITHUB_ENV
      - name: Run tests with coverage
        working-directory: api
        run: |
          pytest tests/ --cov=. --cov-report=xml --cov-report=term-missing -v
      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

  build:
    runs-on: ubuntu-latest
    needs: test

    services:
      registry:
        image: registry:2
        ports:
          - 5000:5000

    steps:
      - uses: actions/checkout@v4

      - name: Set SHA
        run: echo "SHA=$(git rev-parse --short HEAD)" >> $GITHUB_ENV

      - name: Build images
        run: |
          docker build -t $REGISTRY/$IMAGE_PREFIX-api:$SHA ./api
          docker build -t $REGISTRY/$IMAGE_PREFIX-frontend:$SHA ./frontend
          docker build -t $REGISTRY/$IMAGE_PREFIX-worker:$SHA ./worker

      - name: Tag latest
        run: |
          docker tag $REGISTRY/$IMAGE_PREFIX-api:$SHA $REGISTRY/$IMAGE_PREFIX-api:latest
          docker tag $REGISTRY/$IMAGE_PREFIX-frontend:$SHA $REGISTRY/$IMAGE_PREFIX-frontend:latest
          docker tag $REGISTRY/$IMAGE_PREFIX-worker:$SHA $REGISTRY/$IMAGE_PREFIX-worker:latest

      - name: Push images
        run: |
          docker push $REGISTRY/$IMAGE_PREFIX-api:$SHA
          docker push $REGISTRY/$IMAGE_PREFIX-api:latest
          docker push $REGISTRY/$IMAGE_PREFIX-frontend:$SHA
          docker push $REGISTRY/$IMAGE_PREFIX-frontend:latest
          docker push $REGISTRY/$IMAGE_PREFIX-worker:$SHA
          docker push $REGISTRY/$IMAGE_PREFIX-worker:latest
  security:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v4
# https://github.com/marketplace/actions/trivy-action
      - name: Install Trivy
        uses: aquasecurity/trivy-action@master

      - name: Scan images
        run: |
          trivy image --severity CRITICAL --exit-code 1 --format sarif -o trivy-results.sarif $REGISTRY/$IMAGE_PREFIX-api:$SHA
          trivy image --severity CRITICAL --exit-code 1 --format sarif -o trivy-results.sarif $REGISTRY/$IMAGE_PREFIX-frontend:$SHA
          trivy image --severity CRITICAL --exit-code 1 --format sarif -o trivy-results.sarif $REGISTRY/$IMAGE_PREFIX-worker:$SHA

      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif
